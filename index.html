<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hon Chuan Exhibition Hub | 宏全展覽資訊中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── Light mode (default) ── */
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface2: #f0f0ed;
    --border: rgba(0,0,0,0.08);
    --accent: #c9862a;
    --accent2: #3b6fd4;
    --text: #1a1a1a;
    --text-muted: #888888;
    --upcoming: #16a34a;
    --past: #999999;
    --active: #dc2626;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-hover: 0 12px 32px rgba(0,0,0,0.12);
    --header-bg: rgba(247,247,245,0.88);
    --modal-backdrop-bg: rgba(0,0,0,0.35);
    --stat-num-color: #1a1a1a;
  }

  /* ── Dark mode ── */
  :root.dark {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: rgba(255,255,255,0.07);
    --accent: #e8b86d;
    --accent2: #5b8dee;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --upcoming: #34d399;
    --past: #6b7280;
    --active: #f87171;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
    --shadow-hover: 0 20px 40px rgba(0,0,0,0.5);
    --header-bg: rgba(13,15,20,0.75);
    --modal-backdrop-bg: rgba(0,0,0,0.75);
    --stat-num-color: var(--accent);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-size: 20px;
    transition: background 0.3s ease, color 0.3s ease;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(91,141,238,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(201,134,42,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.3s;
  }

  :root.dark body::before {
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(91,141,238,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(232,184,109,0.10) 0%, transparent 60%);
  }

  /* HEADER */
  header {
    z-index: 10;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: var(--header-bg);
    position: sticky;
    top: 0;
    transition: background 0.3s ease, border-color 0.3s ease;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    letter-spacing: 0.02em;
  }

  .logo-sub {
    font-size: 0.9rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* HEADER RIGHT */
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* THEME TOGGLE */
  .theme-toggle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.0625rem;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    flex-shrink: 0;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
    transform: rotate(15deg);
  }

  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }
  :root.dark .theme-toggle .icon-sun { display: block; }
  :root.dark .theme-toggle .icon-moon { display: none; }
  .lang-switcher {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
  }

  .lang-btn {
    background: none;
    border: none;
    font-size: 1.25rem;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    opacity: 0.45;
    line-height: 1;
  }

  .lang-btn.active {
    background: var(--surface2);
    opacity: 1;
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 40px;
  }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.0rem, 5vw, 3.25rem);
    line-height: 1.1;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .page-title span {
    color: var(--accent);
  }

  .page-desc {
    color: var(--text-muted);
    font-size: 0.9375rem;
    margin-bottom: 48px;
    letter-spacing: 0.02em;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 7px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f14;
    font-weight: 500;
  }

  /* SECTION LABEL */
  .section-label {
    font-size: 0.9rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CARD GRID */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    animation: fadeUp 0.5s ease both;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(201,134,42,0.25);
    box-shadow: var(--shadow-hover);
  }

  :root.dark .card:hover {
    border-color: rgba(232,184,109,0.3);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }

  .card-header {
    padding: 20px 22px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
  }

  .card-flag {
    font-size: 1.75rem;
    line-height: 1;
  }

  .card-status {
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 500;
  }

  .status-upcoming {
    background: rgba(52,211,153,0.1);
    color: var(--upcoming);
    border: 1px solid rgba(52,211,153,0.25);
  }

  .status-past {
    background: rgba(107,114,128,0.1);
    color: var(--past);
    border: 1px solid rgba(107,114,128,0.2);
  }

  .status-active {
    background: rgba(248,113,113,0.1);
    color: var(--active);
    border: 1px solid rgba(248,113,113,0.25);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .card-body {
    padding: 20px 22px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.0625rem;
    line-height: 1.35;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .card-location {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .card-date {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    color: var(--accent);
    margin-bottom: 16px;
    font-weight: 500;
  }

  .card-team {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: var(--text-muted);
    font-weight: 500;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
  }

  .card-footer {
    padding: 12px 22px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.15);
  }

  .card-type {
    font-size: 0.9rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .card-arrow {
    font-size: 1rem;
    color: var(--accent);
    transition: transform 0.2s;
  }

  .card:hover .card-arrow {
    transform: translateX(4px);
  }

  /* MODAL */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--modal-backdrop-bg);
    z-index: 100;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-backdrop.open {
    display: flex;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 660px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 28px 32px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }

  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px;
    height: 32px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .modal-close:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .modal-flag {
    font-size: 2.5rem;
    margin-bottom: 10px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.375rem;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .modal-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 0.9rem;
    color: var(--text-muted);
  }

  .modal-meta span {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .modal-body {
    padding: 28px 32px;
  }

  .info-row {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .info-box {
    flex: 1;
    min-width: 140px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .info-box-label {
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .info-box-value {
    font-size: 0.9375rem;
    font-weight: 500;
    color: var(--text);
  }

  .section-title {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
    margin-bottom: 12px;
    margin-top: 28px;
    padding-left: 10px;
    border-left: 3px solid var(--accent);
    line-height: 1.3;
  }

  .description-text {
    font-size: 0.9rem;
    line-height: 1.7;
    color: #9ca3af;
  }

  .tag-list {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.9rem;
    padding: 4px 12px;
    border-radius: 999px;
  }

  .attendee-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
  }

  .attendee-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .attendee-avatar {
    width: 36px;
    height: 36px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 500;
    color: #0d0f14;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
  }

  .attendee-info {}
  .attendee-name { font-size: 0.9rem; font-weight: 500; }
  .attendee-role { font-size: 0.9rem; color: var(--text-muted); }

  /* Customer visit report */
  .cv-intro {
    font-size: 0.9rem;
    line-height: 1.75;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .cv-brand-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 4px;
  }
  .cv-brand-card {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
  }
  .cv-brand-card.key {
    border-color: var(--accent);
    background: var(--surface);
  }
  .cv-brand-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .cv-brand-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }
  .cv-brand-badge {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent);
    color: #0d0f14;
    font-weight: 600;
  }
  .cv-brand-desc {
    font-size: 0.875rem;
    line-height: 1.65;
    color: var(--text-muted);
  }
  .cv-sub-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    margin: 16px 0 8px;
  }
  .cv-pill-list {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .cv-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.875rem;
    padding: 4px 12px;
    border-radius: 999px;
  }
  .cv-pkg-table {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .cv-pkg-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
  }
  .cv-pkg-label {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }
  .cv-pkg-sub {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .cv-pkg-sizes {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .cv-pkg-size-tag {
    font-size: 0.78rem;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 4px;
    padding: 1px 7px;
  }
  :root.dark .cv-pkg-size-tag {
    border-color: rgba(255,255,255,0.1);
  }
  .cv-note {
    font-size: 0.875rem;
    line-height: 1.7;
    color: var(--text-muted);
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    margin-top: 14px;
  }
  .cv-para {
    font-size: 0.9rem;
    line-height: 1.75;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .cv-para:last-child { margin-bottom: 0; }
  .cv-highlight {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 10px;
    display: block;
  }
  .cv-gallery {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .cv-gallery-item {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface2);
    cursor: zoom-in;
  }
  .cv-gallery-item img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    transition: transform 0.2s;
  }
  .cv-gallery-item:hover img { transform: scale(1.03); }
  .cv-gallery-item .cv-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 6px 8px;
    font-size: 0.72rem;
    line-height: 1.3;
    color: #fff;
    background: linear-gradient(transparent, rgba(0,0,0,0.65));
  }
  .cv-gallery-item.expanded {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    z-index: 200;
    background: #000;
    cursor: zoom-out;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cv-gallery-item.expanded img {
    width: 100%;
    height: 100%;
    aspect-ratio: unset;
    object-fit: contain;
    transform: none;
  }
  .cv-gallery-item.expanded .cv-caption { font-size: 0.85rem; }

  /* Special product section */
  .market-info-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 8px 0 12px;
  }
  .market-info-item {
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .market-info-item-index {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .market-info-item-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .market-info-item-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .market-info-item-content {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.55;
  }

  .market-price-note {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin: 10px 0 4px;
    line-height: 1.5;
  }
  .market-price-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    font-size: 0.82rem;
  }
  .market-price-table th {
    background: var(--accent);
    color: #fff;
    padding: 6px 8px;
    text-align: left;
    font-weight: 600;
  }
  .market-price-table th:last-child,
  .market-price-table td:last-child:not(.market-price-category) {
    text-align: right;
    white-space: nowrap;
  }
  .market-price-category {
    background: var(--surface2);
    font-weight: 700;
    font-size: 0.78rem;

function renderMarketPriceTable(data, lang) {
  const catLabel = lang === 'zh'
    ? { '碳酸飲料':'碳酸飲料', '果汁與果茶':'果汁與果茶', '運動與能量飲料':'運動與能量飲料', '水與氣泡水':'水與氣泡水', '其他':'其他' }
    : { '碳酸飲料':'Carbonated Drinks', '果汁與果茶':'Juice & Tea', '運動與能量飲料':'Sports & Energy', '水與氣泡水':'Water & Sparkling', '其他':'Others' };
  const thName  = lang === 'zh' ? '產品' : 'Product';
  const thSpec  = lang === 'zh' ? '規格' : 'Size';
  const thPrice = lang === 'zh' ? '售價 (USD)' : 'Price (USD)';
  const cats = [...new Set(data.map(d => d.category))];
  const rows = cats.map(cat => {
    const items = data.filter(d => d.category === cat);
    const itemRows = items.map(d => `
      <tr${d.highlight ? ' class="market-price-highlight"' : ''}>
        <td><span>${d.name}</span><span class="market-price-original">${d.original_name}</span></td>
        <td class="market-price-spec">${d.spec}</td>
        <td class="market-price-usd">$${d.price_usd.toFixed(2)}</td>
      </tr>`).join('');
    return `<tr><td colspan="3" class="market-price-category">${catLabel[cat] || cat}</td></tr>${itemRows}`;
  }).join('');
  const note = lang === 'zh'
    ? '* 同產品不同口味但同價格者，僅列示一種口味作為代表。'
    : '* For products with multiple flavors at the same price, only one flavor is listed as representative.';
  return `<p class="market-price-note">${note}</p>
  <table class="market-price-table">
    <thead><tr><th>${thName}</th><th>${thSpec}</th><th>${thPrice}</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderCustomerVisits(cv) {
  const brands = cv.brands.map(b => `
    <div class="cv-brand-card${b.isKey ? ' key' : ''}">
      <div class="cv-brand-header">
        <span class="cv-brand-name">${b.name}</span>
        ${b.isKey ? '<span class="cv-brand-badge">重點客戶</span>' : ''}
      </div>
      <div class="cv-brand-desc">${b.desc}</div>
    </div>`).join('');

  const d = cv.detail;
  const pkgRows = d.packaging.map(p => `
    <div class="cv-pkg-row">
      <div class="cv-pkg-label">${p.label}</div>
      <div class="cv-pkg-sub">${p.sub}</div>
      <div class="cv-pkg-sizes">${p.sizes.map(s => `<span class="cv-pkg-size-tag">${s}</span>`).join('')}</div>
    </div>`).join('');

  const tcParas = cv.tetheredCap.map(p =>
    p.highlight
      ? `<span class="cv-highlight">${p.text}</span>`
      : `<p class="cv-para">${p.text}</p>`
  ).join('');
  const fuParas = cv.followUp.map(p => `<p class="cv-para">${p}</p>`).join('');

  const gallery = cv.photos ? `
    <div class="cv-gallery">
      ${cv.photos.map((p, i) => `
        <div class="cv-gallery-item" onclick="toggleCvPhoto(this)" data-index="${i}">
          <img src="${p.src}" alt="${p.caption}" loading="lazy">
          <div class="cv-caption">${p.caption}</div>
        </div>`).join('')}
    </div>` : '';

  return `
    <div class="cv-intro">${cv.intro}</div>
    <div class="cv-brand-grid">${brands}</div>

    <div class="cv-sub-title">Bambito 品牌與產品</div>
    <div class="cv-para">${d.groupDesc}</div>

    <div class="cv-sub-title">產品類型</div>
    <div class="cv-pill-list">${d.productTypes.map(t => `<span class="cv-pill">${t}</span>`).join('')}</div>

    <div class="cv-sub-title">包裝規格</div>
    <div class="cv-pkg-table">${pkgRows}</div>
    <div class="cv-note">♻️ ${d.sustainability}</div>

    <div class="cv-sub-title">連結蓋導入情況</div>
    ${tcParas}

    <div class="cv-sub-title">拜訪交流與後續機會</div>
    ${fuParas}
    ${gallery}
  `;
}

function applyLang() {
  const t = i18n[currentLang];
  document.getElementById('header-sub').textContent = t.headerSub;
  document.getElementById('page-title').innerHTML = t.pageTitle;
  document.getElementById('page-desc').textContent = t.pageDesc;
  document.getElementById('stat1-label').textContent = t.stat1;
  document.getElementById('stat2-label').textContent = t.stat2;
  document.getElementById('stat3-label').textContent = t.stat3;
  document.getElementById('filter-all').textContent = t.filterAll;
  document.getElementById('filter-upcoming').textContent = t.filterUpcoming;
  document.getElementById('filter-past').textContent = t.filterPast;
  document.getElementById('filter-attend').textContent = t.filterAttend;
  document.getElementById('filter-visit').textContent = t.filterVisit;
  document.getElementById('section-upcoming-label').textContent = t.sectionUpcoming;
}

function toggleCvPhoto(el) {
  if (el.classList.contains('expanded')) {
    el.classList.remove('expanded');
    document.body.style.overflow = '';
  } else {
    document.querySelectorAll('.cv-gallery-item.expanded').forEach(e => {
      e.classList.remove('expanded');
    });
    el.classList.add('expanded');
    document.body.style.overflow = 'hidden';
  }
}

function avatarText(name) {
  const base = name.replace(/\s*\(.*\)/, '').trim();
  if (/^[\u4e00-\u9fff]/.test(base)) return base.slice(1);
  return base.slice(0, 2).toUpperCase();
}

function updateStats() {
  const upcoming = exhibitions.filter(e => e.status === 'upcoming').length;
  const past = exhibitions.filter(e => e.status === 'past').length;
  document.getElementById('stat1-num').textContent = upcoming;
  document.getElementById('stat2-num').textContent = past;
  document.getElementById('stat3-num').textContent = upcoming + past;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-' + f).classList.add('active');
  renderCards();
}

function renderCards() {
  const t = i18n[currentLang];
  const grid = document.getElementById('card-grid');
  let list = exhibitions;
  if (currentFilter === 'upcoming') list = list.filter(e => e.status === 'upcoming');
  if (currentFilter === 'past') list = list.filter(e => e.status === 'past');
  if (currentFilter === 'attend') list = list.filter(e => e.type === 'attend');
  if (currentFilter === 'visit') list = list.filter(e => e.type === 'visit');

  grid.innerHTML = list.map(ex => {
    const statusClass = ex.status === 'upcoming' ? 'status-upcoming' : ex.status === 'active' ? 'status-active' : 'status-past';
    const statusText = ex.status === 'upcoming' ? t.statusUpcoming : ex.status === 'active' ? t.statusActive : t.statusPast;
    const typeText = ex.type === 'attend' ? t.typeAttend : t.typeVisit;
    return `
    <div class="card" onclick="openModal(${ex.id})">
      <div class="card-header">
        <div class="card-flag">${ex.flag}</div>
        <div class="card-status ${statusClass}">${statusText}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${ex.title[currentLang]}</div>
        <div class="card-location">📍 ${ex.location[currentLang]}</div>
        <div class="card-date">📅 ${ex.dates}</div>
        <div class="card-team">
          ${ex.team.map(m => `<div class="avatar" title="${m.name}">${avatarText(m.name)}</div>`).join('')}
        </div>
      </div>
      <div class="card-footer">
        <span class="card-type">${typeText}</span>
        <span class="card-arrow">→</span>
      </div>
    </div>`;
  }).join('');
}

function openModal(id) {
  const ex = exhibitions.find(e => e.id === id);
  const t = i18n[currentLang];
  document.getElementById('modal-flag').textContent = ex.flag;
  document.getElementById('modal-title').textContent = ex.title[currentLang];
  document.getElementById('modal-date').textContent = '📅 ' + ex.dates;
  document.getElementById('modal-loc').textContent = '📍 ' + ex.location[currentLang];
  // Country section
  document.getElementById('modal-country-label').textContent = t.countryLabel;
  const c = ex.country;
  document.getElementById('modal-country-grid').innerHTML = [
    [t.cpCapital, c.capital],
    [t.cpPop,     c.population[currentLang]],
    [t.cpLang,    c.language[currentLang]],
    [t.cpCurrency,c.currency[currentLang]],
    [t.cpArea,    c.area],
    [t.cpTz,      c.timezone],
  ].map(([label, val]) => `
    <div class="info-box">
      <div class="info-box-label">${label}</div>
      <div class="info-box-value">${val}</div>
    </div>`).join('');
  document.getElementById('modal-country-desc').textContent = c.desc[currentLang];
  document.getElementById('modal-country-tags').innerHTML = c.highlights[currentLang]
    .map(h => `<span class="country-tag">${h}</span>`).join('');

  document.getElementById('modal-desc-label').textContent = t.descLabel;
  const bannerSection = document.getElementById('modal-banner-section');
  if (ex.banner) {
    bannerSection.style.display = '';
    document.getElementById('modal-banner-img').src = ex.banner;
  } else {
    bannerSection.style.display = 'none';
  }
  document.getElementById('modal-desc').textContent = ex.desc[currentLang];
  const photosSection = document.getElementById('modal-photos-section');
  if (ex.photos && ex.photos.length) {
    photosSection.style.display = '';
    document.getElementById('modal-photos-gallery').innerHTML = ex.photos.map(src =>
      `<div class="cv-gallery-item" onclick="this.classList.toggle('expanded')">
        <img src="${src}" alt="展會照片">
      </div>`
    ).join('');
  } else {
    photosSection.style.display = 'none';
  }
  document.getElementById('modal-tags-label').textContent = t.tagsLabel;
  const tagsEl = document.getElementById('modal-tags');
  if (ex.customerVisits) {
    tagsEl.style.display = 'block';
    tagsEl.innerHTML = renderCustomerVisits(ex.customerVisits);
  } else {
    tagsEl.style.display = '';
    tagsEl.innerHTML = ex.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
  }
  document.getElementById('modal-team-label').textContent = t.teamLabel;
  document.getElementById('modal-team').innerHTML = ex.team.map(m => `
    <div class="attendee-row">
      <div class="attendee-avatar">${avatarText(m.name)}</div>
      <div class="attendee-info">
        <div class="attendee-name">${m.name}</div>
        <div class="attendee-role">${m.role[currentLang]}</div>
      </div>
    </div>`).join('');
  document.getElementById('modal-info-row').innerHTML = `
    <div class="info-box"><div class="info-box-label">${t.boxDate}</div><div class="info-box-value">${ex.dates}</div></div>
    <div class="info-box"><div class="info-box-label">${t.boxVenue}</div><div class="info-box-value">${ex.venue[currentLang]}</div></div>
    <div class="info-box"><div class="info-box-label">${t.boxType}</div><div class="info-box-value">${ex.type === 'attend' ? t.typeAttend : t.typeVisit}</div></div>
    <div class="info-box"><div class="info-box-label">${t.boxBooth}</div><div class="info-box-value">${ex.booth[currentLang]}</div></div>
  `;
  document.getElementById('modal-map-btn').textContent = t.mapBtn;
  document.getElementById('modal-map-btn').onclick = () => window.open(ex.mapUrl, '_blank');
  document.getElementById('modal-web-btn').textContent = t.webBtn;
  document.getElementById('modal-web-btn').onclick = () => window.open(ex.webUrl, '_blank');
  // Market info section
  const marketSection = document.getElementById('modal-market-section');
  if (ex.marketInfo && ex.marketInfo.length > 0) {
    marketSection.style.display = '';
    document.getElementById('modal-market-label').textContent = t.marketLabel;
    const marketPrefix = currentLang === 'zh' ? '市場資訊' : 'Market Info';
    document.getElementById('modal-market-list').innerHTML = ex.marketInfo.map((item, idx) => `
      <div class="market-info-item">
        <div class="market-info-item-index">${marketPrefix} ${idx + 1}</div>
        ${item.title ? `<div class="market-info-item-title">${item.title[currentLang]}</div>` : ''}
        <div class="market-info-item-label">${item.label[currentLang]}</div>
        <div class="market-info-item-content">${item.content[currentLang]}</div>
        ${item.images && item.images.length ? `<div class="cv-gallery" style="margin-top:10px">${item.images.map(src => `<div class="cv-gallery-item" onclick="this.classList.toggle('expanded')"><img src="${src}" alt="市場資訊圖片"></div>`).join('')}</div>` : ''}
        ${item.desc ? `<div class="market-info-item-desc">${item.desc[currentLang]}</div>` : ''}
        ${item.priceTable ? renderMarketPriceTable(item.priceTable, currentLang) : ''}
      </div>`).join('');
  } else {
    marketSection.style.display = 'none';
  }
  // Special product section
  const spSection = document.getElementById('modal-special-product-section');
  if (ex.specialProduct) {
    spSection.style.display = '';
    document.getElementById('modal-special-product-label').textContent = t.specialProductLabel;
    const sp = ex.specialProduct;
    document.getElementById('modal-special-product-meta').innerHTML = `
      <div class="sp-meta-row"><span class="sp-meta-label">${t.spLocation}</span><span class="sp-meta-value">${sp.location[currentLang]}</span></div>
      <div class="sp-meta-row"><span class="sp-meta-label">${t.spProduct}</span><span class="sp-meta-value">${sp.product[currentLang]}</span></div>
    `;
    document.getElementById('modal-special-product-gallery').innerHTML = sp.images
      .map(src => `<img class="sp-img" src="${src}" alt="特殊產品圖片" onclick="this.classList.toggle('expanded')">`).join('');
  } else {
    spSection.style.display = 'none';
  }
  const backdrop = document.getElementById('modal-backdrop');
  backdrop.classList.add('open');
  document.getElementById('modal-content').scrollTop = 0;
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-backdrop')) {
    document.getElementById('modal-backdrop').classList.remove('open');
  }
}

// Touch swipe-down to close modal (only when scrolled to top)
(function() {
  const modal = document.getElementById('modal-content');
  const body = modal.querySelector('.modal-body');
  const backdrop = document.getElementById('modal-backdrop');
  let startY = 0, isDragging = false;

  modal.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    isDragging = body.scrollTop === 0;
    if (isDragging) modal.style.transition = 'none';
  }, { passive: true });

  modal.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) modal.style.transform = `translateY(${dy}px)`;
    else isDragging = false;
  }, { passive: true });

  modal.addEventListener('touchend', e => {
    const dy = e.changedTouches[0].clientY - startY;
    modal.style.transition = '';
    modal.style.transform = '';
    if (isDragging && dy > 80) backdrop.classList.remove('open');
    isDragging = false;
  });
})();

// Theme toggle
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.querySelector('meta[name="theme-color"]').setAttribute('content', isDark ? '#0d0f14' : '#f7f7f5');
}

// Restore saved theme
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') {
    document.documentElement.classList.add('dark');
    document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0d0f14');
  }
})();

// Init
applyLang();
renderCards();
updateStats();
</script>
